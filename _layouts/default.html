<script>
  // Crosshair cursor
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .project-cell, .series-item').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('hover'));
    el.addEventListener('mouseleave', () => cur.classList.remove('hover'));
  });

  // Scroll reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('on'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.rv, .rv-l').forEach(el => obs.observe(el));

  // Nav highlight
  const secs = document.querySelectorAll('[id]');
  const links = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', () => {
    let cur2 = '';
    secs.forEach(s => { if (window.scrollY >= s.offsetTop - 120) cur2 = s.id; });
    links.forEach(a => { a.style.color = a.getAttribute('href') === '#' + cur2 ? 'var(--accent)' : ''; });
  });
</script>

<script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  
  formspree('initForm', { 
    formElement: '#contact-form', // Ensure your <form> has id="contact-form"
    formId: 'xreorqkn',
    onSuccess: function() {
      // Hide form and show success message
      document.getElementById('contact-form').style.opacity = '0.3';
      document.getElementById('contact-form').style.pointerEvents = 'none';
      document.getElementById('fs-status-success').style.display = 'block';
      document.getElementById('fs-status-error').style.display = 'none';
    },
    onError: function() {
      // Show error message
      document.getElementById('fs-status-error').style.display = 'block';
      document.getElementById('fs-status-success').style.display = 'none';
    }
  });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found</title>
  
  <link rel="shortcut icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --concrete: #c8c4bc;
      --stone:    #f0ede8;
      --void:     #141210;
      --steel:    #6b6760;
      --blue:     #1a2840;
      --accent:   #4a7fa5;
      --line:     rgba(20,18,16,0.12);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; height: 100%; }

    body {
      background: var(--stone);
      color: var(--void);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── CURSOR & OVERLAY ── */
    #cur {
      position: fixed; width: 1px; height: 24px; background: var(--void);
      pointer-events: none; z-index: 9999; transform: translate(-50%,-50%);
      transition: height .2s, background .2s, opacity .2s;
    }
    #cur::after {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 24px; height: 1px; background: var(--void); transition: width .2s, background .2s;
    }
    #cur.hover { height: 32px; background: var(--accent); }
    #cur.hover::after { width: 32px; background: var(--accent); }

    .grid-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 80px 80px; opacity: 0.5;
    }

    /* ── NAVIGATION ── */
    nav {
      position: relative; z-index: 500; height: 60px;
      display: grid; grid-template-columns: 60px 1fr auto 60px;
      border-bottom: 1px solid var(--line);
    }
    .nav-rule { border-right: 1px solid var(--line); }
    .nav-logo-cell {
      grid-column: 2; padding: 1.1rem 1.5rem; display: flex; align-items: center; border-right: 1px solid var(--line);
    }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 0.95rem; letter-spacing: 0.02em; text-decoration: none; color: var(--void); }
    .nav-logo em { font-style: italic; color: var(--accent); }

    /* ── 404 LAYOUT ── */
    .section-wrap { 
      flex-grow: 1; display: grid; grid-template-columns: 60px 1fr 60px; 
    }
    .sw-rule-l { border-right: 1px solid var(--line); }
    .sw-rule-r { border-left: 1px solid var(--line); }
    
    .error-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      z-index: 10;
    }

    .error-code {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(8rem, 20vw, 15rem);
      line-height: 0.8;
      color: var(--void);
      position: relative;
    }
    
    /* Architectural slash through the 404 */
    .error-code::after {
      content: '';
      position: absolute;
      top: 50%; left: -10%; right: -10%;
      height: 1px;
      background: var(--accent);
      transform: rotate(-10deg);
      pointer-events: none;
    }

    .error-meta {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--steel);
      margin-top: 2rem;
      margin-bottom: 3rem;
    }

    .back-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border: 1px solid var(--line);
      color: var(--void);
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s ease;
      background: rgba(240,237,232,0.5);
      backdrop-filter: blur(4px);
    }

    .back-btn:hover {
      background: var(--void);
      color: var(--stone);
      border-color: var(--void);
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 900px) {
      .section-wrap { display: flex; flex-direction: column; }
      .sw-rule-l, .sw-rule-r { display: none; }
      nav { display: flex; padding: 0 20px; }
      .nav-rule { display: none; }
      .nav-logo-cell { padding: 1.1rem 0; border: none; }
    }
  </style>
</head>
<body>

<div class="grid-overlay"></div>
<div id="cur"></div>

<nav>
  <div class="nav-rule"></div>
  <div class="nav-logo-cell">
    <a href="{{ '/' | relative_url }}" cla<a href="https://kodeoffun.github.io/" class="nav-logo">kodeoffun</em></a>ss="nav-logo">kodeoffun</em></a>
  </div>
  <div class="nav-rule" style="grid-column: 4;"></div>
</nav>

<div class="section-wrap">
  <div class="sw-rule-l"></div>
  
  <div class="error-container">
    <div class="error-code">404</div>
    <div class="error-meta">Coordinates Not Found · Dead End</div>
<a href="https://kodeoffun.github.io/" class="back-btn">Return to Base</a>  </div>

  <div class="sw-rule-r"></div>
</div>

<script>
  // Crosshair Cursor Logic
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('hover'));
    el.addEventListener('mouseleave', () => cur.classList.remove('hover'));
  });
</script>

</body>
</html>
